name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../moho-mate-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz moho-mate
          cd ../../..
          shasum -a 256 moho-mate-*.tar.gz > moho-mate-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz.sha256
      
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../moho-mate-${{ github.ref_name }}-${{ matrix.artifact }}.zip moho-mate.exe
          cd ../../..
          certutil -hashfile moho-mate-${{ github.ref_name }}-${{ matrix.artifact }}.zip SHA256 > moho-mate-${{ github.ref_name }}-${{ matrix.artifact }}.zip.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            moho-mate-*.tar.gz
            moho-mate-*.tar.gz.sha256
            moho-mate-*.zip
            moho-mate-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sha256" -o -name "*.zip" -o -name "*.zip.sha256" \) -exec cp {} release-files/ \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: defims/moho-mate
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag: ${{ github.ref_name }}
          name: moho-mate ${{ github.ref_name }}
          body: |
            ## moho-mate ${{ github.ref_name }}
            
            ### 下载
            
            | 平台 | 文件 |
            |------|------|
            | macOS (Intel) | `moho-mate-${{ github.ref_name }}-macos-x64.tar.gz` |
            | macOS (Apple Silicon) | `moho-mate-${{ github.ref_name }}-macos-arm64.tar.gz` |
            | Windows | `moho-mate-${{ github.ref_name }}-windows-x64.zip` |
            
            ### 安装
            
            ```bash
            curl -fsSL https://moho-mate.maohou.com/get | bash
            ```
            
            ### 校验
            
            下载对应的 `.sha256` 文件验证完整性。
          files: release-files/*
          draft: false
          prerelease: false
