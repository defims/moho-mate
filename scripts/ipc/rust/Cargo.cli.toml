[package]
name = "moho-mate"
version = "0.1.0"
edition = "2021"

# 只编译可执行文件（同时作为 CLI 和 Lua 模块）
[[bin]]
name = "moho-mate"
path = "src/main.rs"

[dependencies]
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
dirs = "5"
rand = "0.8"
clap = { version = "4", features = ["derive"] }
zip = "0.6"

[target.'cfg(target_os = "macos")'.dependencies]
# 不需要 dispatch2，使用自定义 GCD FFI

[profile.release]
opt-level = 3
lto = true
panic = "unwind"
