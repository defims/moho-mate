# Cloudflare Worker 配置
name = "moho-token-service"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV 存储（生产环境必需）
# [[kv_namespaces]]
# binding = "TOKENS"
# id = "your-kv-namespace-id"

# 环境变量
[vars]
ENVIRONMENT = "production"

# 路由（可选，绑定自定义域名）
# [[routes]]
# pattern = "token.moho.yourdomain.com/*"
# zone_name = "yourdomain.com"
